id: secret-redaction
title: A redacted value is not on the wire at all — the key is disclosed, the value is withheld.
why: >
  Keys-only disclosure, and the reason it is now SAFE by construction rather than by discipline.

  The projection used to substitute a mask — `**REDACTED**` — for a Secret's value. That mask was the
  only poisoned value in the system, and we invented it: a browser holding it can send it back on an
  ordinary save, and the literal string `**REDACTED**` is written OVER the real secret. The token is
  destroyed, and from the browser it looked like a green tick. It needed a guard on every adopter's
  save endpoint, forever, correctly (proposal 0003).

  So we stopped inventing it. Two obligations now, and neither is belt-and-braces:

    1. the gateway DELETES the value and declares the path (RFC 6901 pointers) in `redactedPaths` —
       on the wire, per object, mandatory, authoritative. That array is where the consumer learns
       `token` exists at all, and it carries everything the mask used to carry;
    2. the client marks those paths read-only: no draft, no dirty, no conflict, never in a patch.

  The third obligation — "the server must reject a patch touching a redacted path" — is GONE, because
  the thing it defended against cannot happen: there is no redacted value anywhere for a draft to
  hold or a patch to carry.

  Editing an UNREDACTED field of the same object must still work — that is the whole point of
  keys-only disclosure. You can see that `token` exists, you can rename the object's labels, and you
  can never learn or clobber the token itself.
suites: [gateway, client]
scope: { target: demo, version: v1, resource: secrets, namespace: app }
projection: krm-editor/v1

watch:
  # What the API server sends: a REAL Secret, with real base64 values in it.
  - { op: list, bodies: [secret-token.v1] }

events:
  - type: reset
  - type: added
    # What the browser gets: the same object with `data` EMPTIED. The difference between these two
    # files is the projection, and it is now a real difference rather than a mask being re-masked.
    body: secret-token.v1-wire
    # The keys live here, and nowhere else. This is what a UI renders `token ••••••` from.
    redactedPaths: ["/data/token", "/data/username"]
  - type: synced

client:
  edits:
    - { after: 2, op: set, uid: secret-token-0001, path: [metadata, labels, "app.kubernetes.io/name"], value: checkout }
  expect:
    dirty: [[metadata, labels, "app.kubernetes.io/name"]]   # the unredacted edit works normally
    conflicts: []
    readOnlyPaths:
      - [data, token]        # named ONLY by redactedPaths -> read-only -> not dirtiable
      - [data, username]
    patch:                   # the patch touches NOTHING under data/ — there is nothing there to touch
      metadata:
        labels:
          app.kubernetes.io/name: checkout

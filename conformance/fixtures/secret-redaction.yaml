id: secret-redaction
title: A redacted value is shown as a mask, is never dirtiable, and can never be written back.
why: >
  The rule that makes a Secret safe to display at all: a value you never SAW cannot round-trip over
  the real one. Three obligations, and all three must hold or the feature is a vulnerability:

    1. the gateway declares WHICH paths are redacted (RFC 6901 pointers), on the wire, per object —
       so a consumer never has to infer redaction from a value that merely LOOKS like a placeholder;
    2. the client marks those paths read-only: no draft, no dirty, no conflict, never in a patch;
    3. the gateway REJECTS any patch that touches a redacted path — belt and braces, because the
       client is not the security boundary. A hostile client is just a client.

  Editing an UNREDACTED field of the same object must still work — that is the whole point of
  keys-only disclosure. You can see that `token` exists, you can rename the object's labels, and you
  can never learn or clobber the token itself.
suites: [gateway, client]
scope: { target: demo, version: v1, resource: secrets, namespace: app }
projection: krm-editor/v1

watch:
  - { op: list, bodies: [secret-token.v1] }

events:
  - type: reset
  - type: added
    body: secret-token.v1
    redactedPaths: ["/data/token", "/data/username"]
  - type: synced

client:
  edits:
    - { after: 2, op: set, uid: secret-token-0001, path: [metadata, labels, "app.kubernetes.io/name"], value: checkout }
  expect:
    dirty: [[metadata, labels, "app.kubernetes.io/name"]]   # the unredacted edit works normally
    conflicts: []
    readOnlyPaths:
      - [data, token]                       # masked -> read-only -> not dirtiable
      - [data, username]
    patch:                                  # the patch touches NOTHING under data/
      metadata:
        labels:
          app.kubernetes.io/name: checkout

# The gateway's half: a patch that DOES touch a redacted path must be refused before it reaches the
# API server, whatever the client believes.
gatewayRejects:
  - patch: { data: { token: "hunter2" } }
    code: FORBIDDEN
    because: "/data/token is redacted under krm-editor/v1"

id: status-only-churn
title: A status-only update produces no event when the selected projection ignores status.
why: >
  `krm-spec/v1` ignores `status`, so a controller-only update must emit no event at all. Meanwhile the
  user is editing `spec.replicas`; the suppressed status heartbeat must not touch that draft.

  On a real workload this — not editing — is the dominant traffic on the stream.
suites: [gateway, client]
scope: { target: demo, group: apps, version: v1, resource: deployments, namespace: app }
projection: krm-spec/v1

watch:
  - { op: list, bodies: [deploy-web.v1] }
  - { op: modified, body: deploy-web.v2 }   # status only: readyReplicas 1 -> 2, Available False -> True

events:
  - { type: reset }
  - { type: added, body: deploy-web.v1-spec }
  - { type: synced }

client:
  edits:
    - { after: 2, op: set, uid: deploy-web-0001, path: [spec, replicas], value: 4 }
  expect:
    dirty: [[spec, replicas]]               # the ONLY dirty path — status can never be one
    conflicts: []
    draftSubset:
      spec: { replicas: 4 }                 # the edit survived suppressed status churn
    patch: { spec: { replicas: 4 } }        # status is NOT in the patch. It cannot be.

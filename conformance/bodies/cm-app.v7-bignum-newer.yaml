# One digit longer than v6-bignum, and therefore GREATER: "if they are not of equal length, the longer
# one is greater" — the comparison Kubernetes prescribes. A lexicographic compare that forgot the
# length rule would call this OLDER and drop it, and the user would never see the change.
apiVersion: v1
kind: ConfigMap
metadata:
  uid: cm-app-0001
  name: app-config
  namespace: app
  resourceVersion: "12345678901234567890123456789012345678901"
  labels:
    app.kubernetes.io/name: shop
  annotations:
    note: keep
data:
  log-level: warn
  replicas: "3"

# The baseline Deployment: nested `spec`, an associative array (containers), and a live `status`.
# This is the object that proves the point of the whole project — you can watch `status` reconcile
# while you edit `spec`, and neither disturbs the other.
apiVersion: apps/v1
kind: Deployment
metadata:
  uid: deploy-web-0001
  name: web
  namespace: app
  resourceVersion: "3001"
  generation: 4
  labels:
    app.kubernetes.io/name: web
spec:
  replicas: 2
  paused: false
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ghcr.io/configbutler/web:v1.2.3
          ports:
            - containerPort: 8080
status:
  observedGeneration: 4
  replicas: 2
  readyReplicas: 1
  conditions:
    - type: Available
      status: "False"
      reason: MinimumReplicasUnavailable

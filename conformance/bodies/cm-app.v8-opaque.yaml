# A resourceVersion that is NOT an orderable decimal. On Kubernetes 1.35+ this cannot happen: from
# 1.35 "orderability of resource versions for all Kubernetes types is included in Certified Kubernetes
# requirements... Base API objects AND custom resources must be orderable as a monotonically
# increasing integer" (docs/facts/kubernetes-api-concepts.md §2).
#
# So an upstream that serves this is one of two things, and both are worth being told about: a cluster
# older than 1.35, or an aggregated/extension API server — a third-party implementation the conformance
# test does not cover, and the one case the docs still carve out ("you cannot rely on comparisons for
# ordering").
apiVersion: v1
kind: ConfigMap
metadata:
  uid: cm-app-0001
  name: app-config
  namespace: app
  resourceVersion: "opaque-alpha"
data:
  log-level: info

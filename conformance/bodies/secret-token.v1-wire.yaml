# The same Secret under `krm-full/v1`: values are omitted from the object. The accompanying event's
# `redacted` entries declare which paths exist upstream, allowing the client to render them as
# read-only without introducing a placeholder value.
apiVersion: v1
kind: Secret
metadata:
  uid: secret-token-0001
  name: git-creds
  namespace: app
  resourceVersion: "4001"
  labels:
    app.kubernetes.io/name: shop
type: Opaque

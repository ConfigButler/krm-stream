# The same Secret, as it appears ON THE WIRE under `krm-full/v1`. Compare with secret-token.v1.yaml:
# the values are simply GONE.
#
# Note what `data` is: an EMPTY MAP. Not a mask, not a placeholder — nothing. The keys that were there
# are named in `redacted` (`/data/token`, `/data/username`), which is on the wire, per object,
# mandatory and authoritative. That array is where a consumer learns `token` exists at all, and it
# carries everything a mask used to carry. A UI renders `token ••••••` from it.
#
# There used to be a `**REDACTED**` placeholder in these values, and deleting it is the whole of
# proposal 0003: a mask sitting in the object is a value a browser can SAVE BACK, and a merge patch
# carrying `**REDACTED**` writes that literal string OVER the real secret. It was the only poisoned
# value in the system, and it was ours. Now there is nothing to write back — the hazard cannot arise,
# rather than being guarded.
#
# An earlier version left `data: {}` behind, and that was wrong for a rule this projection had ALREADY
# written down one function up: an annotations map that is empty only because WE emptied it is our
# artifact, not the server's state. `data: {}` says "this Secret has an empty data map" — a DIFFERENT
# fact from "this Secret's data is not yours to see", and the second is what happened. The reductio
# that settles it: `ignore` on `status` must obviously not leave `status: {}` behind.
apiVersion: v1
kind: Secret
metadata:
  uid: secret-token-0001
  name: git-creds
  namespace: app
  resourceVersion: "4001"
  labels:
    app.kubernetes.io/name: shop
type: Opaque

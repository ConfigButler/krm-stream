# A Secret under the `krm-editor/v1` projection: the KEYS are disclosed, the VALUES are not.
#
# `redactedPaths` is on the wire (RFC 6901 JSON Pointers) so the consumer never has to GUESS whether
# a value is real. The placeholder is displayed as a mask, is never dirtiable, and — the rule that
# makes this safe — can never be written back over the real value: the gateway rejects any patch
# touching a redacted path.
apiVersion: v1
kind: Secret
metadata:
  uid: secret-token-0001
  name: git-creds
  namespace: app
  resourceVersion: "4001"
  labels:
    app.kubernetes.io/name: shop
type: Opaque
data:
  token: "**REDACTED**"
  username: "**REDACTED**"

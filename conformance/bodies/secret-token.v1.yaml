# A real Secret, as a real API server serves it: base64 values, and they are SECRET.
#
# This is the gateway's INPUT — what arrives on the watch. What goes on the WIRE is
# secret-token.v1-wire.yaml, and the difference between the two files IS the projection.
#
# They used to be the same file, which only worked because masking an already-masked value produces
# the same masked value. That accident hid the fact that the corpus never actually watched a Secret
# with a real value in it. Now it does, and `krm-editor/v1` has to genuinely remove something.
apiVersion: v1
kind: Secret
metadata:
  uid: secret-token-0001
  name: git-creds
  namespace: app
  resourceVersion: "4001"
  labels:
    app.kubernetes.io/name: shop
type: Opaque
data:
  token: aHVudGVyMg==       # "hunter2" — and it must never reach a browser, in any form
  username: Ym9i            # "bob"

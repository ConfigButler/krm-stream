# A resourceVersion that does NOT fit in an int64. This is not contrived: Kubernetes documents
# resource versions as "arbitrary bitsize decimal integers" and its own worked example is 40 digits
# long (docs/facts/kubernetes-api-concepts.md §2).
#
# strconv.ParseInt tops out at 19 digits. The gateway used to compare with it, so on a cluster like
# this one the parse failed, the monotonicity check gave up, and live updates were silently dropped —
# which in a status view is indistinguishable from "the cluster is being slow".
apiVersion: v1
kind: ConfigMap
metadata:
  uid: cm-app-0001
  name: app-config
  namespace: app
  resourceVersion: "2345678901234567890123456789012345678901"
  labels:
    app.kubernetes.io/name: shop
  annotations:
    note: keep
data:
  log-level: info
  replicas: "3"
